apply plugin: 'com.android.application'
android {
    compileSdk 34
    defaultConfig {
        applicationId "Com.tetstmib.app"
        minSdk 21
        targetSdk 34
        versionCode 100
        versionName "1.0.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
    namespace "Com.tetstmib.app"
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}